 <script type="text/javascript">
   function ReadExcel() {
     var tempStr = "";
           //得到文件路径的值
           var filePath = document.getElementById("upfile").value;
           //创建操作EXCEL应用程序的实例
           var oXL = new ActiveXObject("Excel.application");
            //打开指定路径的excel文件
            var oWB = oXL.Workbooks.open(filePath);
           //操作第一个sheet(从一开始，而非零)
           oWB.worksheets(1).select();
           var oSheet = oWB.ActiveSheet;
           //使用的行数
           var rows =  oSheet .usedrange.rows.count;
           //读取每格的值，注意是从1开始
		   var Report ;
        try {
            for (var i = 2; i <= rows; i++) {
             if (oSheet.Cells(i, 2).value == "null" || oSheet.Cells(i, 3).value == "null")
              break;  
            tempStr += (" "+ oSheet.Cells(i, 1).value + " " + oSheet.Cells(i, 2).value + " " + oSheet.Cells(i, 3).value + oSheet.Cells(i, 4).value+" "+ oSheet.Cells(i, 5).value+" "+ oSheet.Cells(i, 6).value+" "+ oSheet.Cells(i, 7).value+" "+ oSheet.Cells(i, 8).value+" "+ oSheet.Cells(i, 9).value+'\n');
          }  
		 
		 Report = "【一、情况综述】  月 日 至 月 日 中山网络运行正常。 【二、网络运行情况】（环比：5天均值/上月均值） 1、网络运行数据 1.1用户数 登记用户数："+oSheet.Cells(3,6)+"万，环比增加"+Math.round(oSheet.Cells(3,7)*10000)/100+"%； 漫入用户数："+oSheet.Cells(4,6)+"万，环比增加"+Math.round(oSheet.Cells(4,7)*10000)/100+"%； 漫出用户数："+oSheet.Cells(5,6)+"万，环比增加"+Math.round(oSheet.Cells(5,7)*10000)/100+"%；家宽在线峰值用户数："+oSheet.Cells(6,6)+"万，环比增加"+Math.round(oSheet.Cells(6,7)*10000)/100+"%； IPTV在线峰值用户数："+oSheet.Cells(7,6)+"万，环比增加"+Math.round(oSheet.Cells(7,7)*10000)/100+"%； VoLTE用户数："+oSheet.Cells(8,6)+"万，环比增加"+Math.round(oSheet.Cells(8,7)*10000)/100+"%。 4G用户数"+Math.round(oSheet.Cells(9,6)*100)/100+"万，环比增加"+Math.round(oSheet.Cells(9,7)*10000)/100+"%；5G用户数："+oSheet.Cells(10,6)+"万，环比增加"+Math.round(oSheet.Cells(10,7)*10000)/100+"% 1.2业务量 2G话务量：万"+oSheet.Cells(11,6)+"ERL，环比增加"+Math.round(oSheet.Cells(11,7)*10000)/100+"%；<br>VoLTE话务量:"+oSheet.Cells(12,6)+"万ERL,环比增加"+Math.round(oSheet.Cells(12,7)*10000)/100+"%； 4G流量："+Math.round(oSheet.Cells(13,6)*100)/100+"TB，环比增加"+Math.round(oSheet.Cells(13,7)*10000)/100+"%；5G流量："+oSheet.Cells(14,6)+"TB，环比增加"+Math.round(oSheet.Cells(14,7)*10000)/100+"%1.3投诉处理情况 广义投诉"+oSheet.Cells(17,6)+"宗，环比增加"+Math.round(oSheet.Cells(17,7)*10000)/100+"%； 投诉工单：EOMS系统共收到客服系统转派投诉工单"+oSheet.Cells(16,6)+"张，处理情况正常。其中家宽投诉工单"+oSheet.Cells(18,6)+"张，环比增加"+Math.round(oSheet.Cells(18,7)*10000)/100+"%。 1.4无线指标 GSM接通率："+Math.round(oSheet.Cells(19,6)*10000)/100+"%，环比增加"+Math.round(oSheet.Cells(19,7)*10000)/100+"%； VoLTE接通率："+Math.round(oSheet.Cells(20,6)*10000)/100+"%，环比增加"+Math.round(oSheet.Cells(20,7)*10000)/100+"%； GSM最差小区比例"+Math.round(oSheet.Cells(21,6)*10000)/100+"%，环比增加"+Math.round(oSheet.Cells(21,7)*10000)/100+"%； TD-LTE最差小区比例："+Math.round(oSheet.Cells(22,6)*10000)/100+"%，环比增加"+Math.round(oSheet.Cells(22,7)*10000)/100+"%。 【三、重要网络调整】 截止今天7时，中山共完成10项重要网络调整，其中A级0项，B级0项，C级0项，D级10项，其它0项。管控过程未发现异常。 【四、值班人员】 核心网（李城）、动力（龚伟）、线路（黄立伟）、无线网（李志冬）、集客（蒋小林）。 编辑：周宙霖（网络监控室：13902820066）";
		  }
        catch(e) {
          document.getElementById("txtArea").value = tempStr;
		   document.getElementById("reportArea").value =Report;
		  }
        document.getElementById("txtArea").value = tempStr;
		 document.getElementById("reportArea").value = Report;
           //退出操作excel的实例对象
           oXL.Application.Quit();
           //手动调用垃圾收集器
           CollectGarbage();
          }  
 </script>
